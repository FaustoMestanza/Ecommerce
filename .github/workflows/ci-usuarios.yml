name: CI - Usuarios

on:
  push:
    paths:
      - 'usuarios/**'
    branches: [ main ]
  pull_request:
    paths:
      - 'usuarios/**'
    branches: [ main ]

jobs:
  build-and-push:
    name: Build & Push Usuarios Service
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: ⚙️ Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # TESTS
      - name: TESTS | Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r usuarios/requirements.txt

      - name: TESTS | Run tests
        run: |
          cd usuarios
          python manage.py migrate --noinput
          python manage.py test

      # DOCKER HUB
      - name: DOCKER HUB | Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # DOCKER IMAGE
      - name: DOCKER IMAGE | Build
        uses: docker/build-push-action@v4
        with:
          context: ./usuarios
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/usuarios-service:latest

      - name: DOCKER HUB | Push image
        if: success()
        uses: docker/build-push-action@v4
        with:
          context: ./usuarios
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/usuarios-service:latest
