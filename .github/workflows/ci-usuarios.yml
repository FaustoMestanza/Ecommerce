name: CI - Usuarios

on:
  push:
    paths:
      - 'usuarios/**'
    branches: [ main ]
  pull_request:
    paths:
      - 'usuarios/**'
    branches: [ main ]

jobs:
  tests:
    name: TESTS | Usuarios
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: TESTS | Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r usuarios/requirements.txt

      - name: TESTS | Run tests
        run: |
          cd usuarios
          python manage.py migrate --noinput
          python manage.py test

  publish:
    name: DOCKER | Publish Usuarios
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: DOCKER HUB | Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: DOCKER IMAGE | Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./usuarios
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/usuarios-service:latest

      - name: RENDER | Trigger deploy
        env:
          RENDER_DEPLOY_HOOK_USUARIOS: ${{ secrets.RENDER_DEPLOY_HOOK_USUARIOS }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_USUARIOS" ]; then
            echo "Missing RENDER_DEPLOY_HOOK_USUARIOS secret"
            exit 1
          fi
          curl --fail --show-error --silent -X POST "$RENDER_DEPLOY_HOOK_USUARIOS"
